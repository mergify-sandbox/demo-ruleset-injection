name: CI

on:
  pull_request:
  push:
    branches: [main]

# The job name "ci" is the status-check context the ruleset requires and the
# context Mergify injects as `check-success = ci`. Keep them in sync.
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest
      - run: python -m pytest -q
