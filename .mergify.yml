# MRGFY-7814 — validate that Mergify's injected `github-require-last-push-approval`
# makes the same accept/hold decision GitHub itself makes. Mirrors Depop's
# `merge-default` rule. The require-last-push-approval condition is injected
# automatically from the active branch ruleset (require_last_push_approval=true)
# because Mergify is not a ruleset bypass actor — it is intentionally NOT written
# here.

pull_request_rules:
  - name: merge-default
    conditions:
      - -draft
      - -closed
      - -merged
      - -conflict
      - base=main
      - label=flag:merge
      - linear-history
      - github-review-decision=APPROVED
    actions:
      merge:
        method: squash
