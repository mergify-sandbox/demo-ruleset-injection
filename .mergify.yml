# Demo: see Mergify render merge protections on a pull request's live
# "Mergify Merge Protections" check.
#
# `merge_protections` below mirrors the GitHub ruleset `main protection (demo)`
# (rulesets/main-protection.json). The conditions are authored here by hand and
# kept in parity with the ruleset: merge_protections does NOT inject from GitHub
# rulesets — branch-protection injection is a merge-queue-only feature.
#
# Real ruleset injection still happens in the queue below
# (branch_protection_injection_mode: queue), but for an un-queued PR that
# evaluation surfaces only in the Mergify dashboard event-log, not as a GitHub
# check:
#   https://dashboard.mergify.com/event-logs?login=mergify-sandbox&repository=demo-merge-protection

merge_protections:
  - name: Ruleset parity (demo)
    description: >-
      Surfaces the `main protection (demo)` GitHub ruleset on the "Mergify
      Merge Protections" check. merge_protections has no Mergify-side ruleset
      injection, but `github-review-decision` defers to GitHub's own
      ruleset-computed decision (approval count + require_last_push_approval).
    if:
      - base = main
    success_conditions:
      # reviewDecision = APPROVED requires both the ruleset's approval count and
      # its require_last_push_approval to be satisfied.
      - "github-review-decision = APPROVED"
      - "#review-threads-unresolved = 0"
      - "check-success = ci"

queue_rules:
  - name: default
    # `queue` injects ruleset conditions for queuing and merging; `merge` only
    # at merge time; `none` disables injection.
    branch_protection_injection_mode: queue
    queue_conditions:
      - base = main
    merge_conditions: []

pull_request_rules:
  - name: Queue PRs labeled "queue"
    conditions:
      - base = main
      - label = queue
    actions:
      queue:
